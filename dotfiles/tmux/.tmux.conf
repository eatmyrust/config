# Selectively copied from zaiste/tmuxified, since rebuilt around TPM + Catppuccin

setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -s escape-time 10
set -g set-titles on

set -g base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g allow-rename off

bind Tab last-window

bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

bind -r Space next-layout

set -g bell-action none

setw -g clock-mode-colour colour135

set -g message-command-style fg=blue,bg=black
set -g message-style fg=colour232,bg=colour4

setw -g mode-style bg=colour195,fg=black
setw -g monitor-activity on

set -g set-titles-string '#(whoami) :: #h'

set -g status-justify left
set -g status-interval 2
set -g status-position top

set -g visual-activity on
set -g visual-bell off
set -g visual-silence off

set -g pane-border-style fg=black,bg=colour235
set -g pane-active-border-style bg=colour236,fg=colour51

set -g set-titles on

# ==================== Plugins (managed by TPM) ====================

set -g @plugin 'tmux-plugins/tpm'

# Cross-tool aware pane navigation: Ctrl-h/j/k/l moves between tmux panes
# *and* Neovim splits with the same keys, detecting which side of the
# boundary you're on. Replaces plain `select-pane` bindings.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence: save/restore sessions across reboots, autosave
# periodically. `resurrect` does the save/restore, `continuum` automates it.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Theme, matched to the Neovim colorscheme (catppuccin/nvim, mocha flavour).
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "date_time"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# Initialize TPM (must be the last line in this file).
# First run: install plugins with prefix + I.
run '~/.tmux/plugins/tpm/tpm'
